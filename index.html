<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TinyTotes</title>
<style>
body{font-family:Arial;margin:0;background:#fff7f0}
header{background:#ff8fab;padding:15px;color:#fff;display:flex;justify-content:space-between}
.logo{width:120px;height:50px;background:#fff;display:flex;align-items:center;justify-content:center}
nav a{color:#fff;margin:0 10px;text-decoration:none}
.banner{text-align:center;padding:20px;background:#ffd6e0}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.product{background:#fff;padding:10px;border-radius:10px;text-align:center}
.image-placeholder{height:120px;background:#eee;margin-bottom:10px}
.add-cart{background:#ff8fab;color:#fff;border:none;padding:5px;margin-top:5px;cursor:pointer}
.cart-box{position:fixed;right:10px;top:80px;width:250px;background:#fff;border:1px solid #ccc;padding:10px;border-radius:10px}
.cart-box h3{text-align:center}
.cart-item{display:flex;justify-content:space-between;margin:5px 0}
.remove-btn{background:red;color:#fff;border:none;padding:2px 5px;cursor:pointer}
.checkout{background:green;color:#fff;border:none;padding:8px;width:100%;margin-top:10px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5)}
.modal-content{background:#fff;margin:10% auto;padding:20px;width:300px}
</style>
</head>
<body>

<header>
<div class="logo">LOGO</div>
<h2>TinyTotes</h2>
<nav>
<a href="#">Home</a>
<a href="#firstcry">FirstCry</a>
<a href="#mothercare">Mothercare</a>
<a href="#johnsons">Johnsons</a>
<a href="#nautinati">Nautinati</a>
<a href="#skillmatics">Skillmatics</a>
</nav>
</header>

<div class="banner">
<h2>Same Day Delivery | Free Delivery above ₹999</h2>
</div>

<div class="container">

<h2 id="firstcry">FirstCry</h2>
<div class="products">
<div class="product"><div class="image-placeholder"></div><h4 onclick="openDetail('Baby Dress')">Baby Dress</h4><button class="add-cart" onclick="addToCart('Baby Dress',299)">Add</button></div>
<div class="product"><div class="image-placeholder"></div><h4 onclick="openDetail('Toy Car')">Toy Car</h4><button class="add-cart" onclick="addToCart('Toy Car',199)">Add</button></div>
</div>

</div>

<!-- CART UI -->
<div class="cart-box">
<h3>Cart</h3>
<div id="cartItems"></div>
<h4 id="total">Total: ₹0</h4>
<button class="checkout">Checkout</button>
</div>

<!-- PRODUCT DETAIL -->
<div class="modal" id="detailModal">
<div class="modal-content">
<h3 id="detailTitle"></h3>
<p>Product description here...</p>
<p id="detailPrice"></p>
<button onclick="closeDetail()">Close</button>
</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
renderCart();

function addToCart(name, price){
  cart.push({name, price});
  saveCart();
  renderCart();
}

function renderCart(){
  let container = document.getElementById('cartItems');
  container.innerHTML = '';
  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;
    container.innerHTML += `<div class="cart-item">${item.name} ₹${item.price} <button class="remove-btn" onclick="removeItem(${index})">X</button></div>`;
  });

  document.getElementById('total').innerText = 'Total: ₹' + total;
}

function removeItem(index){
  cart.splice(index, 1);
  saveCart();
  renderCart();
}

function openDetail(name){
  document.getElementById('detailTitle').innerText = name;
  document.getElementById('detailPrice').innerText = 'Price: ₹___';
  document.getElementById('detailModal').style.display = 'block';
}

function closeDetail(){
  document.getElementById('detailModal').style.display = 'none';
}

function saveCart(){
  localStorage.setItem('cart', JSON.stringify(cart));
}

// Checkout Button Action
window.onload = function(){
  document.querySelector('.checkout').addEventListener('click', function(){
    if(cart.length === 0){
      alert('Your cart is empty');
    } else {
      alert('Proceeding to checkout! (Next step: Payment Integration)');
    }
  });
};
</script>

</body>
</html>
